<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huseljic · Arbre Généalogique</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5F0E8;
  --ink: #1a1612;
  --ink-light: #4a4540;
  --ink-muted: #8a847c;
  --gold: #B8936A;
  --gold-light: #D4B896;
  --huseljic: #2C4A3E;
  --huseljic-light: #4a7a6a;
  --huseljic-pale: #E8F0EE;
  --lopo: #3A2C4A;
  --lopo-light: #6a4a7a;
  --lopo-pale: #EEE8F0;
  --me: #B8936A;
  --line: #C8BFB0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Jost', sans-serif;
  background: var(--cream);
  color: var(--ink);
  overflow: hidden;
  width: 100vw; height: 100vh;
  user-select: none;
}

/* PASSWORD */
#password-screen {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--ink);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2rem;
}
#password-screen h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.8rem; font-weight: 300;
  color: var(--cream); letter-spacing: 0.08em;
}
#pw-input {
  background: transparent; border: none;
  border-bottom: 1px solid var(--gold);
  color: var(--cream); font-family: 'Jost', sans-serif;
  font-size: 1.2rem; padding: 0.5rem 1rem;
  text-align: center; outline: none; letter-spacing: 0.3em; width: 220px;
}
#pw-input::placeholder { color: #555; letter-spacing: 0.1em; }
#pw-error { color: #c97; font-size: 0.8rem; opacity: 0; transition: opacity 0.3s; }
#pw-error.show { opacity: 1; }
#pw-btn {
  background: var(--gold); border: none; color: var(--ink);
  font-family: 'Jost', sans-serif; font-size: 0.8rem;
  font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase;
  padding: 0.7rem 2.5rem; cursor: pointer; transition: background 0.2s;
}
#pw-btn:hover { background: var(--gold-light); }

/* LANGUAGE */
#lang-screen {
  position: fixed; inset: 0; z-index: 999;
  background: var(--ink);
  display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 3rem;
}
#lang-screen h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 3.2rem; font-weight: 300;
  color: var(--cream); letter-spacing: 0.06em; text-align: center; line-height: 1.2;
}
.lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #333; border: 1px solid #333; }
.lang-btn {
  background: #111; color: var(--cream);
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem; font-weight: 300;
  padding: 1.8rem 3.5rem; cursor: pointer;
  transition: background 0.2s, color 0.2s;
  text-align: center; border: none; letter-spacing: 0.05em;
}
.lang-btn:hover { background: var(--gold); color: var(--ink); }
.lang-btn small { display: block; font-family: 'Jost', sans-serif; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.6; margin-top: 4px; }

/* APP */
#app { display: none; width: 100%; height: 100%; position: relative; }

/* TOOLBAR */
#toolbar {
  position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%);
  z-index: 100; display: flex; align-items: center; gap: 1rem;
  background: rgba(26,22,18,0.92); backdrop-filter: blur(10px);
  padding: 0.6rem 1.2rem; border-radius: 2rem;
  border: 0.5px solid rgba(184,147,106,0.3);
}
#toolbar h1 { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 400; color: var(--cream); letter-spacing: 0.1em; white-space: nowrap; }
.tb-sep { width: 1px; height: 18px; background: rgba(255,255,255,0.15); }
.tb-btn { background: none; border: none; color: var(--gold-light); font-family: 'Jost', sans-serif; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; padding: 0.2rem 0.4rem; transition: color 0.2s; white-space: nowrap; }
.tb-btn:hover { color: var(--cream); }
#lang-indicator { font-size: 0.7rem; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }

/* LEGEND */
#legend { position: fixed; bottom: 1.5rem; left: 1.5rem; z-index: 100; display: flex; flex-direction: column; gap: 0.5rem; }
.legend-item { display: flex; align-items: center; gap: 8px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-label { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); }

/* CANVAS */
#viewport { width: 100%; height: 100%; overflow: hidden; position: relative; cursor: grab; }
#viewport:active { cursor: grabbing; }
#world { position: absolute; transform-origin: 0 0; }

/* SVG lines — inside world, so they move with it */
#lines-svg { position: absolute; top: 0; left: 0; overflow: visible; pointer-events: none; }

/* PERSON */
.person {
  position: absolute;
  width: 120px;
  display: flex; flex-direction: column; align-items: center;
  cursor: pointer;
}
.person-photo {
  width: 66px; height: 66px; border-radius: 50%;
  border: 2.5px solid var(--line);
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: transform 0.2s;
}
.person:hover .person-photo { transform: scale(1.07); }
.person-photo img { width: 100%; height: 100%; object-fit: cover; }
.person-initials { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 400; color: white; }
.person-info { text-align: center; margin-top: 5px; }
.person-first { font-family: 'Cormorant Garamond', serif; font-size: 0.82rem; font-weight: 500; line-height: 1.2; color: var(--ink); }
.person-maiden { font-family: 'Cormorant Garamond', serif; font-size: 0.68rem; font-weight: 300; font-style: italic; color: var(--ink-muted); line-height: 1.2; }
.person-dates { font-size: 0.6rem; color: var(--ink-muted); letter-spacing: 0.03em; margin-top: 2px; }
.badge-migration { font-size: 0.52rem; letter-spacing: 0.06em; text-transform: uppercase; padding: 1px 5px; border-radius: 99px; margin-top: 3px; display: inline-block; background: #E6F1FB; color: #185FA5; }

/* ZOOM */
#zoom-controls { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 100; display: flex; flex-direction: column; gap: 4px; }
.zoom-btn { width: 36px; height: 36px; background: rgba(26,22,18,0.85); border: 0.5px solid rgba(184,147,106,0.3); color: var(--gold-light); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.zoom-btn:hover { background: rgba(26,22,18,1); }
#zoom-label { text-align: center; font-size: 0.62rem; color: var(--ink-muted); letter-spacing: 0.05em; }

/* MODAL */
#modal-overlay { position: fixed; inset: 0; z-index: 500; background: rgba(26,22,18,0.7); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; }
#modal-overlay.open { display: flex; }
.modal { background: var(--cream); width: 380px; max-width: 95vw; max-height: 90vh; overflow-y: auto; border: 0.5px solid var(--gold-light); position: relative; }
.modal-header { padding: 2rem 2rem 1.2rem; border-bottom: 0.5px solid var(--line); display: flex; gap: 1.2rem; align-items: flex-start; }
.modal-photo { width: 72px; height: 72px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 2px solid var(--gold-light); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; color: white; }
.modal-photo img { width: 100%; height: 100%; object-fit: cover; }
.modal-name { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 400; line-height: 1.2; }
.modal-relation { font-size: 0.72rem; color: var(--ink-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }
.modal-body { padding: 1.2rem 2rem; }
.modal-row { display: flex; justify-content: space-between; align-items: baseline; padding: 0.55rem 0; border-bottom: 0.5px solid rgba(200,191,176,0.4); font-size: 0.82rem; }
.modal-row:last-child { border-bottom: none; }
.modal-key { color: var(--ink-muted); letter-spacing: 0.06em; }
.modal-val { color: var(--ink); text-align: right; max-width: 60%; }
.modal-notes { margin-top: 1rem; padding: 1rem; background: rgba(0,0,0,0.03); border-left: 2px solid var(--gold); font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.9rem; line-height: 1.6; color: var(--ink-light); }
.modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--ink-muted); width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { color: var(--ink); }
.modal-hint { padding: 0.8rem 2rem 1.2rem; font-size: 0.7rem; color: var(--ink-muted); letter-spacing: 0.05em; text-align: center; border-top: 0.5px solid var(--line); }
</style>
</head>
<body>

<!-- PASSWORD -->
<div id="password-screen">
  <div style="text-align:center;">
    <p style="font-size:0.7rem;color:#555;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:1rem;">Famille Huseljic · Lopo</p>
    <h1>Arbre Généalogique</h1>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:1rem;">
    <input type="password" id="pw-input" placeholder="mot de passe" autocomplete="off">
    <p id="pw-error">Mot de passe incorrect</p>
    <button id="pw-btn" onclick="checkPassword()">Entrer</button>
  </div>
  <p style="font-size:0.65rem;color:#444;letter-spacing:0.1em;">Accès réservé à la famille</p>
</div>

<!-- LANGUAGE -->
<div id="lang-screen">
  <div style="text-align:center;">
    <p style="font-size:0.7rem;color:#555;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:0.8rem;">Famille · Porodica · Family · Familie</p>
    <h1>Choisissez<br>votre langue</h1>
  </div>
  <div class="lang-grid">
    <button class="lang-btn" onclick="setLang('fr')">Français<small>France</small></button>
    <button class="lang-btn" onclick="setLang('bs')">Bosanski<small>Bosna</small></button>
    <button class="lang-btn" onclick="setLang('en')">English<small>English</small></button>
    <button class="lang-btn" onclick="setLang('de')">Deutsch<small>Deutschland</small></button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="toolbar">
    <h1>Huseljic · Lopo</h1>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="resetView()">⌂ Centrer</button>
    <div class="tb-sep"></div>
    <span id="lang-indicator" onclick="changeLang()">FR</span>
  </div>

  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--huseljic);"></div><span class="legend-label" id="leg-huseljic">Lignée Huseljic</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--lopo);"></div><span class="legend-label" id="leg-lopo">Lignée Lopo</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--me);"></div><span class="legend-label" id="leg-me">Vous</span></div>
  </div>

  <div id="zoom-controls">
    <button class="zoom-btn" onclick="doZoom(1.2)">+</button>
    <div id="zoom-label">100%</div>
    <button class="zoom-btn" onclick="doZoom(0.8)">−</button>
    <button class="zoom-btn" onclick="resetView()" style="font-size:0.7rem;">↺</button>
  </div>

  <div id="viewport">
    <div id="world">
      <svg id="lines-svg"></svg>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-header">
      <div class="modal-photo" id="modal-photo"></div>
      <div><div class="modal-name" id="modal-name"></div><div class="modal-relation" id="modal-relation"></div></div>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-hint" id="modal-hint"></div>
  </div>
</div>

// Couple pairs (drawn as dashed horizontal line between photo centers)
const couples = [
  ['hasan','disa_dz','huseljic'],
  ['omer_besic','fatima_besic','huseljic'],
  ['jusuf','zehra','lopo'],
  ['mehmed','aisa','lopo'],
  ['sakib','nazifa','huseljic'],

  ['fuad','mersija','huseljic'],
  ['osman','alma','lopo'],
  ['almir','delila','lopo'],
  ['adnan','emina','lopo'],
];

// Parent→children (mid of couple → children list)
const families = [
  { p1:'hasan',     p2:'disa_dz',    children:['sakib'],                        branch:'huseljic' },
  { p1:'omer_besic',p2:'fatima_besic',children:['nazifa'],                       branch:'huseljic' },
  { p1:'jusuf',     p2:'zehra',      children:['ferida'],                        branch:'lopo'     },
  { p1:'mehmed',    p2:'aisa',       children:['omer_lopo'],                     branch:'lopo'     },
  { p1:'sakib',     p2:'nazifa',     children:['faruk','fatima_h','bedrija','dika_l','disa_s','fuad'], branch:'huseljic' },
  { p1:'ferida',    p2:'omer_lopo',  children:['mersija','alma'],                branch:'lopo'     },
  { p1:'fuad',      p2:'mersija',    children:['adna','adin','armin'],           branch:'huseljic' },
  { p1:'osman',     p2:'alma',       children:['delila','emina'],               branch:'lopo'     },
  { p1:'almir',     p2:'delila',     children:['nadia_i','omar_i'],             branch:'lopo'     },
  { p1:'adnan',     p2:'emina',      children:['ahmed','ajdin'],                branch:'lopo'     },

function initials(p) { return (p.first[0]+(p.maiden||p.last)[0]).toUpperCase(); }

// photoCX(key) = world X of photo center
function photoCX(key) { return people[key].x + PHOTO_CX; }
// photoCY(key) = world Y of photo center
function photoCY(key) { return people[key].y + PHOTO_CY; }
// photoBottom(key) = world Y of photo bottom
function photoBottom(key) { return people[key].y + PHOTO_CY + PHOTO_R; }
// photoTop(key) = world Y of photo top
function photoTop(key) { return people[key].y + PHOTO_CY - PHOTO_R; }

function renderPeople() {
  const world = document.getElementById('world');
  // Remove existing person divs
  world.querySelectorAll('.person').forEach(e => e.remove());

  Object.entries(people).forEach(([key, p]) => {
    const div = document.createElement('div');
    div.className = 'person';
    div.style.left = p.x + 'px';
    div.style.top  = p.y + 'px';
    div.onclick = () => showModal(key);

    const bg = branchColor(p.branch);
    const photoHtml = p.photo
      ? `<img src="photos/${p.photo}" alt="${p.first}">`
      : `<span class="person-initials" style="color:white;">${initials(p)}</span>`;

    div.innerHTML = `
      <div class="person-photo" style="background:${bg};border-color:${bg}88;">${photoHtml}</div>
      <div class="person-info">
        <div class="person-first">${p.first}</div>
        ${p.maiden ? `<div class="person-maiden">(${p.maiden})</div>` : ''}
        ${p.born
          ? `<div class="person-dates">${p.born}${p.died?' – '+p.died:''}</div>`
          : `<div class="person-dates" style="opacity:0.4;font-size:0.58rem;">—</div>`}
        ${p.migrated ? `<span class="badge-migration">✈ ${p.migrated.from}→${p.migrated.to}</span>` : ''}
      </div>`;
    world.appendChild(div);
  });
}

function drawLines() {
  const svg = document.getElementById('lines-svg');
  svg.innerHTML = '';

  // Compute bounding box for SVG sizing
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  Object.values(people).forEach(p => {
    minX = Math.min(minX, p.x);
    minY = Math.min(minY, p.y);
    maxX = Math.max(maxX, p.x + 120);
    maxY = Math.max(maxY, p.y + 180);
  });
  const pad = 100;
  svg.setAttribute('width',  maxX - minX + pad*2);
  svg.setAttribute('height', maxY - minY + pad*2);
  svg.style.left = (minX - pad) + 'px';
  svg.style.top  = (minY - pad) + 'px';
  const ox = minX - pad; // offset: svg world coords = svg internal coords + ox
  const oy = minY - pad;

  function px(worldX) { return worldX - ox; }
  function py(worldY) { return worldY - oy; }

  function line(x1,y1,x2,y2,col,dash) {
    const el = document.createElementNS('http://www.w3.org/2000/svg','line');
    el.setAttribute('x1',px(x1)); el.setAttribute('y1',py(y1));
    el.setAttribute('x2',px(x2)); el.setAttribute('y2',py(y2));
    el.setAttribute('stroke',col); el.setAttribute('stroke-width','1.8');
    if(dash) el.setAttribute('stroke-dasharray','5,4');
    svg.appendChild(el);
    return el;
  }

  // 1. Couple lines: dashed horizontal between photo centers at photo mid-height
  couples.forEach(([k1,k2,branch]) => {
    const col = lineColor(branch);
    const x1 = photoCX(k1) + PHOTO_R; // right edge of left photo
    const x2 = photoCX(k2) - PHOTO_R; // left edge of right photo
    const y  = photoCY(k1);
    if(x2 > x1) line(x1,y,x2,y,col,true);
  });

  // 2. Family connections: vertical from couple mid-point down, then horizontal bus, then drop to each child
  families.forEach(({p1,p2,children,branch}) => {
    const col = lineColor(branch);
    const cx1 = photoCX(p1), cx2 = photoCX(p2);
    const midX = (cx1 + cx2) / 2;
    const parentBottomY = photoBottom(p1); // bottom of photo circle

    // Drop from couple midpoint down
    const dropY = parentBottomY + 50;

    // Children photo tops
    const childTops = children.map(c => photoTop(c));
    const minChildTop = Math.min(...childTops);

    // Vertical from parent down to bus level
    line(midX, parentBottomY, midX, dropY, col, false);

    if(children.length > 1) {
      const childXs = children.map(c => photoCX(c));
      const busLeft  = Math.min(...childXs);
      const busRight = Math.max(...childXs);
      // Horizontal bus
      line(busLeft, dropY, busRight, dropY, col, false);
      // Drop to each child
      children.forEach(c => {
        const cx = photoCX(c);
        const cTop = photoTop(c);
        line(cx, dropY, cx, cTop, col, false);
      });
    } else {
      const cx = photoCX(children[0]);
      const cTop = photoTop(children[0]);
      // Elbow: if same X go straight, else go horizontal then down
      if(Math.abs(cx - midX) < 5) {
        line(midX, dropY, cx, cTop, col, false);
      } else {
        line(midX, dropY, cx, dropY, col, false);
        line(cx, dropY, cx, cTop, col, false);
      }
    }
  });
}

function renderTree() {
  renderPeople();
  // Draw lines after DOM is ready so positions are correct
  requestAnimationFrame(() => drawLines());
}

// PAN & ZOOM
let scale = 0.6;
let tx = 0, ty = 0;
let dragging = false, lastX, lastY;

function applyTransform() {
  document.getElementById('world').style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  document.getElementById('zoom-label').textContent = Math.round(scale*100)+'%';
}

function resetView() {
  const W = window.innerWidth, H = window.innerHeight;
  // Center on Adin
  const adinX = people.adin.x + PHOTO_CX;
  const adinY = people.adin.y + PHOTO_CY;
  tx = W/2 - adinX * scale;
  ty = H/2 - adinY * scale;
  applyTransform();
}

function doZoom(factor, cx, cy) {
  cx = cx || window.innerWidth/2;
  cy = cy || window.innerHeight/2;
  const newScale = Math.min(2, Math.max(0.15, scale * factor));
  // Zoom toward cursor
  tx = cx - (cx - tx) * (newScale / scale);
  ty = cy - (cy - ty) * (newScale / scale);
  scale = newScale;
  applyTransform();
}

const vp = document.getElementById('viewport');
vp.addEventListener('mousedown', e => { dragging=true; lastX=e.clientX; lastY=e.clientY; e.preventDefault(); });
window.addEventListener('mousemove', e => {
  if(!dragging) return;
  tx += e.clientX-lastX; ty += e.clientY-lastY;
  lastX=e.clientX; lastY=e.clientY;
  applyTransform();
});
window.addEventListener('mouseup', () => dragging=false);
vp.addEventListener('wheel', e => {
  e.preventDefault();
  doZoom(e.deltaY < 0 ? 1.1 : 0.9, e.clientX, e.clientY);
}, {passive:false});

let lastTouchDist=null;
vp.addEventListener('touchstart', e => {
  if(e.touches.length===1){ dragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; }
});
vp.addEventListener('touchmove', e => {
  e.preventDefault();
  if(e.touches.length===1 && dragging){
    tx += e.touches[0].clientX-lastX; ty += e.touches[0].clientY-lastY;
    lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
    applyTransform();
  } else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(lastTouchDist) doZoom(d/lastTouchDist,(e.touches[0].clientX+e.touches[1].clientX)/2,(e.touches[0].clientY+e.touches[1].clientY)/2);
    lastTouchDist=d;
  }
},{passive:false});
vp.addEventListener('touchend',()=>{dragging=false;lastTouchDist=null;});

// MODAL
function showModal(key) {
  const p = people[key];
  const t = T[lang];
  const bg = branchColor(p.branch);
  const photoEl = document.getElementById('modal-photo');
  photoEl.style.background = bg;
  photoEl.innerHTML = p.photo
    ? `<img src="photos/${p.photo}" alt="${p.first}">`
    : `<span style="color:white;">${initials(p)}</span>`;
  document.getElementById('modal-name').textContent = p.first+' '+p.last+(p.maiden?` (${p.maiden})`:'');
  document.getElementById('modal-relation').textContent = p.rel[lang];
  const rows = [
    [t.born, p.born||'—'],
    [t.died, p.died||(p.born?t.alive:'—')],
    [t.migration, p.migrated?`${p.migrated.from} → ${p.migrated.to}`:'—'],
  ];
  let body = rows.map(([k,v])=>`<div class="modal-row"><span class="modal-key">${k}</span><span class="modal-val">${v}</span></div>`).join('');
  const note = p.notes[lang];
  if(note) body += `<div class="modal-notes">"${note}"</div>`;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-hint').textContent = t.hint;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }

// PASSWORD
function checkPassword(){
  if(document.getElementById('pw-input').value===PASSWORD){
    document.getElementById('password-screen').style.display='none';
    document.getElementById('lang-screen').style.display='flex';
  } else {
    document.getElementById('pw-error').classList.add('show');
    document.getElementById('pw-input').value='';
    setTimeout(()=>document.getElementById('pw-error').classList.remove('show'),2000);
  }
}
document.getElementById('pw-input').addEventListener('keydown',e=>{ if(e.key==='Enter') checkPassword(); });
